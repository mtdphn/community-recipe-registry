recipe_version: "2"
model: Qwen/Qwen3.5-27B-FP8
runtime: vllm
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly:latest

metadata:
  description: |
    Qwen3.5-27B FP8 with DFlash speculative decoding (drafter z-lab/Qwen3.5-27B-DFlash, num_speculative_tokens=15).
    First spec-decode entry on the spark-arena leaderboard.
    Demonstrates 6.14x peak speedup over BF16 autoregressive at d=0 c=1, geomean 4.53x at c=1 across 7 depths.
    REQUIRES the included llama-benchy patch (patches/llama-benchy-spec-decode-fix) — without it, spec-decode
    throughput is reported at ~5.51 tok/s instead of the real ~25 tok/s due to a SSE-chunk-counting bug in
    llama-benchy <= 0.3.5 that has silently affected every prior spec-decode submission.
  maintainer: "@banana_baeee"
  model_params: 27B
  model_dtype: fp8
  kv_dtype: bfloat16

defaults:
  port: 8000
  host: 127.0.0.1
  tensor_parallel: 1
  pipeline_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 131072
  max_num_batched_tokens: 32768
  max_num_seqs: 16
  load_format: fastsafetensors
  attention_backend: flash_attn
  num_speculative_tokens: 15
  speculative_model: z-lab/Qwen3.5-27B-DFlash
  speculative_config: '{"method": "dflash", "num_speculative_tokens": 15, "model": "z-lab/Qwen3.5-27B-DFlash"}'

env:
  TORCH_CUDA_ARCH_LIST: "12.1a"
  FLASHINFER_CUDA_ARCH_LIST: "12.1a"
  VLLM_USE_FLASHINFER_MOE_FP4: "0"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

post_commands:
  # Apply the llama-benchy SSE-chunk-counting fix to the user's uvx cache before benchmarking.
  # Without this, spec-decode throughput is reported at ~5.51 tok/s instead of ~25 tok/s.
  # The patcher is idempotent — safe to re-run.
  # See patches/llama-benchy-spec-decode-fix/README.md for full explanation and before/after numbers.
  - "python3 patches/llama-benchy-spec-decode-fix/patch_llama_benchy.py"

command: |
  vllm serve {model} \
    --host {host} --port {port} \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --enforce-eager \
    --trust-remote-code \
    --load-format {load_format} \
    --attention-backend {attention_backend} \
    --enable-prefix-caching \
    --speculative-config '{speculative_config}' \
    --seed 0
